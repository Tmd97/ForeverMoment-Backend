version: '3.8'

services:

  # ── Application ──────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: moment-forever-app
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/moment_forever_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=momentforever
      # MongoDB
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/moment_forever
      # Kafka — override localhost:9092 (dev) with kafka:9092 (docker)
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - moment-forever-net
    restart: on-failure

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: moment-forever-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=moment_forever_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=momentforever
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d moment_forever_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moment-forever-net

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: moment-forever-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - moment-forever-net

  # ── Kafka (KRaft mode — no Zookeeper, official Apache image) ─────────────────
  # Uses apache/kafka which is the official Docker image (freely available)
  kafka:
    image: apache/kafka:3.7.0
    container_name: moment-forever-kafka
    ports:
      - "9092:9092" # INTERNAL — used by app container (kafka:9092)
      - "9094:9094" # EXTERNAL — use from host (localhost:9094) for Offset Explorer / kafka-cli
    environment:
      # KRaft — combined broker + controller (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners:
      #  INTERNAL  → container-to-container communication
      #  EXTERNAL  → host machine tools (Offset Explorer, kafkacat, etc.)
      #  CONTROLLER → intra-cluster KRaft communication
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Topic + replication defaults (single-node dev setup)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - moment-forever-net

  # ── Kafka UI (browse topics & messages) ──────────────────────────────────────
  # Access at: http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: moment-forever-kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=moment-forever
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - moment-forever-net

networks:
  moment-forever-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
