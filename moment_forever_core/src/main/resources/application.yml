# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    connection-timeout: 30000
    max-connections: 200
    threads:
      max: 50
      min-spare: 5

# ============================================
# SPRING CONFIGURATION
# ============================================
spring:
  application:
    name: moment-forever-platform

  # ================= DATABASE =================
  datasource:
    url: jdbc:postgresql://localhost:5432/moment_forever_db
    username: postgres
    password: groote
    driver-class-name: org.postgresql.Driver

  # ================= MONGODB =================
  data:
    mongodb:
      uri: mongodb://localhost:27017
      database: moment_forever

  # ================= HIKARI =================
  hikari:
    pool-name: MomentForever-HikariPool
    connection-timeout: 30000
    maximum-pool-size: 20
    minimum-idle: 5
    idle-timeout: 600000
    max-lifetime: 1800000
    connection-test-query: SELECT 1
    auto-commit: false

  # ================= JPA =================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
        query:
          in_clause_parameter_padding: true
        id:
          new_generator_mappings: true
    show-sql: true
    open-in-view: false

  # ================= FILE UPLOAD =================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

  # ================= JACKSON =================
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC
    default-property-inclusion: non_null

  # ================= KAFKA =================
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ============================================
# KAFKA TOPICS
# ============================================
kafka:
  topics:
    booking-requested: topic_booking_requested
    booking-confirmed: topic_booking_confirmed
    booking-failed: topic_booking_failed

# ============================================
# APPLICATION CUSTOM CONFIG
# ============================================
app:
  base-url: http://localhost:8080
  file:
    upload-dir: ./uploads/
    max-size: 5242880
    allowed-extensions: jpg,jpeg,png,gif,webp
    serve-path: /uploads/

  image:
    public-base-url: /images
    admin-base-url: /admin/images
    cdn-base-url: https://cdn.momentforever.com/images
    cache-max-age: 31536000
    use-cdn: false
    thumbnail-size: 150x150
    medium-size: 600x400
    large-size: 1200x800

# ============================================
# SLUG CONFIG
# ============================================
slug:
  separator: "-"
  max-length: 100

# ============================================
# JWT SECURITY
# ============================================
jwt:
  secret: "your-256-bit-secret-key-must-be-at-least-32-characters-long-here"
  expiration: 86400000
  refresh-expiration: 604800000
  issuer: "cherishx.com"
  audience: "cherishx-web-app"

  cookie:
    name: "auth_token"
    secure: true
    http-only: true
    max-age: 86400

  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:4200"
    allowed-methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed-headers:
      - "Authorization"
      - "Content-Type"
      - "X-Requested-With"
    allow-credentials: true

  security:
    password:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-digits: true
      require-special-chars: true
      max-age-days: 90

  rate-limit:
    login:
      max-attempts: 5
      window-minutes: 15
    registration:
      max-per-hour: 10
      max-per-ip: 50

# ============================================
# ACTUATOR
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  probes:
    enabled: true

# ============================================
# SWAGGER
# ============================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
  api-docs:
    path: /v3/api-docs

# ============================================
# OBJECT STORAGE (GRIDFS)
# ============================================
object:
  store:
    provider: gridfs
    gridfs-bucket: fs