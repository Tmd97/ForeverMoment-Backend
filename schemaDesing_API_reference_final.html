## 1. Entity List

| # | Entity | Table Name | Type | Purpose |
|---|---|---|---|---|
| 1 | \`Category\` | \`categories\` | Master | Top-level grouping of experiences |
| 2 | \`SubCategory\` | \`sub_categories\` | Master | Child grouping under a category |
| 3 | \`Experience\` | \`experiences\` | Core | Minimal identity record — what users browse and book |
| 4 | \`ExperienceDetail\` | \`experience_details\` | 1:1 Detail | All rich content and operational config for an experience |
| 5 | \`Inclusion\` | \`inclusions\` | Master | Reusable inclusion items (what’s included / not included) |
| 6 | \`ExperienceInclusionMapper\` | \`experience_inclusion_mappers\` | Junction M:M | Links experiences to inclusion items with display order and active flag |
| 7 | \`CancellationPolicy\` | \`cancellation_policies\` | Master | Reusable cancellation policy statements |
| 8 | \`ExperienceCancellationMapper\` | \`experience_cancellation_mappers\` | Junction M:M | Links experiences to cancellation policies with display order and active flag |
| 9 | \`Media\` | \`media\` | Asset | Reusable image/video file metadata |
| 10 | \`ExperienceMediaMapper\` | \`experience_media_mappers\` | Junction M:M | Links experiences to media assets |
| 11 | \`Addon\` | \`addons\` | Master | Optional add-ons (e.g. cake, photographer) |
| 12 | \`ExperienceAddonMapper\` | \`experience_addon_mappers\` | Junction M:M | Links add-ons to experiences with price override |
| 13 | \`Review\` | \`reviews\` | Child | User reviews and ratings on an experience |
| 14 | \`Location\` | \`locations\` | Master | A city/area where experiences are offered |
| 15 | \`Pincode\` | \`pincodes\` | Child | A specific pincode within a location |
| 16 | \`ExperienceLocationMapper\` | \`experience_location_mappers\` | Junction M:M | Links experiences to locations with price override |
| 17 | \`TimeSlot\` | \`time_slots\` | Master | Reusable time slot definition (Morning, Evening etc.) |
| 18 | \`ExperienceTimeSlotMapper\` | \`experience_timeslot_mappers\` | Junction | Links a timeslot to a specific experience+location with override |
| 19 | \`ExperiencePincodePrice\` | \`experience_pincode_prices\` | Override | Final price override at pincode+timeslot level |

---

## 2. Entity Field Reference

---

### 2.1 \`Category\`
> Top-level grouping. Example: *Celebrations*, *Adventure*, *Dining*.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key, auto-increment |
| \`name\` | VARCHAR(100) | No | Display name of the category |
| \`slug\` | VARCHAR(120) | No | URL-friendly unique identifier (e.g. \`celebrations\`) |
| \`is_active\` | BOOLEAN | No | Whether category is visible on the platform |
| \`deleted\` | BOOLEAN | No | Soft delete flag (default: false) |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.2 \`SubCategory\`
> Second-level grouping under a category. Example: *Birthday Decoration*, *Candle Light Dinner*.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`category_id\` | BIGINT FK | No | Parent category |
| \`name\` | VARCHAR(100) | No | Display name |
| \`slug\` | VARCHAR(120) | No | URL-friendly unique identifier |
| \`is_active\` | BOOLEAN | No | Visibility flag |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.3 \`Experience\`
> Minimal identity record. Only fields needed for listing cards and routing. All rich content lives in \`ExperienceDetail\`.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`sub_category_id\` | BIGINT FK | No | Which sub-category this experience belongs to |
| \`name\` | VARCHAR(200) | No | Display name shown in listings |
| \`slug\` | VARCHAR(220) | No | Unique URL path (e.g. \`rose-gold-birthday-decoration\`) |
| \`tag_name\` | VARCHAR(100) | Yes | Short badge label on listing card (e.g. \`Bestseller\`, \`New\`) |
| \`base_price\` | DECIMAL(10,2) | No | Default price before any location/timeslot override |
| \`display_order\` | INT | No | Admin-controlled listing sort rank (default: 0) |
| \`is_featured\` | BOOLEAN | No | Pin to featured section on homepage |
| \`is_active\` | BOOLEAN | No | Whether the experience is live and bookable |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.4 \`ExperienceDetail\`
> One-to-one extension of Experience holding all rich content and operational config. \`UNIQUE(experience_id)\` enforces the 1:1 relationship.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`experience_id\` | BIGINT FK UNIQUE | No | Links to parent Experience (UNIQUE enforces 1:1) |
| \`short_description\` | VARCHAR(500) | Yes | 1–2 line teaser shown on listing cards |
| \`description\` | TEXT | Yes | Full rich-text description on detail page |
| \`duration_minutes\` | INT | Yes | How long the experience lasts (e.g. \`120\` = 2 hours) |
| \`max_capacity\` | INT | Yes | Maximum number of people the experience can serve |
| \`min_age\` | INT | Yes | Minimum age requirement for participants |
| \`completion_time\` | INT | Yes | Minutes the team needs to setup at venue before client arrival |
| \`min_hours\` | INT | Yes | Minimum hours gap required between booking time and slot start |
| \`terms_conditions\` | TEXT | Yes | Full terms and conditions |
| \`what_to_bring\` | TEXT | Yes | Instructions for the customer on what to prepare |
| \`is_active\` | BOOLEAN | No | Detail record active flag |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.5 \`Inclusion\`
> Master list of reusable items describing what is included (✓) or not included (✗). Example: *200 Rosegold balloons*.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`description\` | TEXT | No | The inclusion item text |
| \`is_included\` | BOOLEAN | No | \`true\` = green ✓ (included), \`false\` = red ✗ (not included) |
| \`is_active\` | BOOLEAN | No | Global visibility of this item |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.6 \`ExperienceInclusionMapper\`
> Junction table linking experiences to inclusion items (M:M). Controls ordering and activation per experience.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`experience_id\` | BIGINT FK | No | The experience |
| \`inclusion_id\` | BIGINT FK | No | The inclusion item |
| \`display_order\` | INT | No | Controls sort order in the list (default: 0) |
| \`is_active\` | BOOLEAN | No | Show/hide this item for this experience (default: true) |
| \`deleted\` | BOOLEAN | No | Soft delete flag (default: false) |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.7 \`CancellationPolicy\`
> Master list of reusable cancellation policy statements. Each has a description and a flag indicating if it’s a favourable rule (✓) or restrictive rule (✗).

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`description\` | TEXT | No | One policy rule (e.g. \`Full refund if cancelled 48 hours before\`) |
| \`is_included\` | BOOLEAN | No | \`true\` = favourable rule ✓, \`false\` = restrictive rule ✗ |
| \`is_active\` | BOOLEAN | No | Global visibility of this policy statement |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.8 \`ExperienceCancellationMapper\`
> Junction table linking experiences to cancellation policies (M:M). Controls ordering and activation per experience.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`experience_id\` | BIGINT FK | No | The experience |
| \`policy_id\` | BIGINT FK | No | The cancellation policy |
| \`display_order\` | INT | No | Controls sort order in the list (default: 0) |
| \`is_active\` | BOOLEAN | No | Show/hide this policy for this experience (default: true) |
| \`deleted\` | BOOLEAN | No | Soft delete flag (default: false) |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.9 \`Media\`
> Central repository for all uploaded image/video files. Decoupled from any single experience so assets can be reused.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`file_name\` | VARCHAR(255) | No | Original uploaded file name |
| \`file_path\` | VARCHAR(500) | No | Storage path or URL (S3 key or GridFS path) |
| \`media_type\` | VARCHAR(20) | No | \`IMAGE\` or \`VIDEO\` |
| \`mime_type\` | VARCHAR(100) | Yes | MIME type (e.g. \`image/jpeg\`, \`video/mp4\`) |
| \`file_size_bytes\` | BIGINT | Yes | File size in bytes |
| \`alt_text\` | VARCHAR(300) | Yes | Accessibility alt text / SEO description |
| \`is_active\` | BOOLEAN | No | Availability flag |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |

---

### 2.10 \`ExperienceMediaMapper\`
> Junction table linking experiences to media assets (M:M). Controls ordering and primary/cover designation.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`experience_id\` | BIGINT FK | No | The experience this media belongs to |
| \`media_id\` | BIGINT FK | No | The media asset |
| \`position\` | INT | No | Sort order within the experience gallery |
| \`is_primary\` | BOOLEAN | No | \`true\` = shown as the main thumbnail in listings |
| \`is_cover\` | BOOLEAN | No | \`true\` = used as the hero banner on detail page |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |

---

### 2.11 \`Addon\`
> Master list of optional extras that can be attached to experiences (e.g. *Birthday Cake*, *Photographer*, *Flower Bouquet*).

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`name\` | VARCHAR(150) | No | Display name of the add-on |
| \`description\` | TEXT | Yes | What is included in this add-on |
| \`icon\` | VARCHAR(200) | Yes | Icon URL or identifier |
| \`base_price\` | DECIMAL(10,2) | No | Default price if no override is set |
| \`is_active\` | BOOLEAN | No | Whether this add-on is offered globally |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.12 \`ExperienceAddonMapper\`
> Links add-ons to experiences. Allows price override and free-addon designation per experience.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`experience_id\` | BIGINT FK | No | The experience |
| \`addon_id\` | BIGINT FK | No | The add-on |
| \`price_override\` | DECIMAL(10,2) | Yes | Custom price for this add-on on this experience; \`null\` = use \`Addon.base_price\` |
| \`is_free\` | BOOLEAN | No | \`true\` = add-on is complimentary for this experience |
| \`is_active\` | BOOLEAN | No | Whether this add-on is offered on this experience |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |

---

### 2.13 \`Review\`
> Customer reviews and ratings submitted after an experience.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`experience_id\` | BIGINT FK | No | Experience being reviewed |
| \`user_id\` | BIGINT FK | Yes | Authenticated user who wrote review; \`null\` if guest review |
| \`title\` | VARCHAR(150) | Yes | Review headline |
| \`rating\` | INT | No | Score from 1 (worst) to 5 (best) |
| \`comment\` | TEXT | Yes | Full review body text |
| \`reviewer_name\` | VARCHAR(100) | Yes | Display name (used for guest reviews) |
| \`reviewer_email\` | VARCHAR(150) | Yes | Email (for guest reviews, not shown publicly) |
| \`helpful_count\` | INT | No | Number of users who marked this review as helpful (default: 0) |
| \`is_approved\` | BOOLEAN | No | Admin approval before going public (default: false) |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.14 \`Location\`
> A city or geographic area where experiences are available.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`name\` | VARCHAR(150) | No | Display name (e.g. \`South Delhi\`) |
| \`city\` | VARCHAR(100) | No | City name (e.g. \`Delhi\`) |
| \`state\` | VARCHAR(100) | Yes | State name (e.g. \`Delhi NCR\`) |
| \`country\` | VARCHAR(100) | No | Country (default: \`India\`) |
| \`address\` | VARCHAR(300) | Yes | Street/area descriptor for the location |
| \`latitude\` | DECIMAL(10,6) | Yes | Geo-coordinate for map display |
| \`longitude\` | DECIMAL(10,6) | Yes | Geo-coordinate for map display |
| \`is_active\` | BOOLEAN | No | Whether this location is currently served |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.15 \`Pincode\`
> A specific postal pincode within a location. Used for the most granular level of pricing.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`location_id\` | BIGINT FK | No | Parent location this pincode belongs to |
| \`pincode_code\` | VARCHAR(20) | No | The actual postal code (e.g. \`110001\`) |
| \`area_name\` | VARCHAR(150) | Yes | Human-readable area name (e.g. \`Connaught Place\`) |
| \`latitude\` | DECIMAL(10,6) | Yes | Optional geo-coordinate of pincode centroid |
| \`longitude\` | DECIMAL(10,6) | Yes | Optional geo-coordinate of pincode centroid |
| \`is_active\` | BOOLEAN | No | Whether this pincode is serviceable |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |

---

### 2.16 \`ExperienceLocationMapper\`
> Links an experience to a location with an optional price override. This is **Level 2** of the dynamic pricing chain.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`experience_id\` | BIGINT FK | No | The experience |
| \`location_id\` | BIGINT FK | No | The location |
| \`price_override\` | DECIMAL(10,2) | Yes | Price for this experience at this location; \`null\` = use \`Experience.base_price\` |
| \`is_active\` | BOOLEAN | No | Whether this experience is available at this location |
| \`valid_from\` | DATE | Yes | Start date from which this mapping is valid |
| \`valid_to\` | DATE | Yes | End date after which this mapping expires |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.17 \`TimeSlot\`
> Master list of reusable time slots. Admin-managed. Examples: *Morning 7–9am*, *Evening 5–7pm*.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`label\` | VARCHAR(100) | No | Display label (e.g. \`Morning Slot\`, \`Golden Hour\`) |
| \`start_time\` | TIME | No | Slot start time |
| \`end_time\` | TIME | No | Slot end time |
| \`is_active\` | BOOLEAN | No | Whether this slot is usable |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |

---

### 2.18 \`ExperienceTimeSlotMapper\`
> Links a time slot to a specific experience+location (\`ExperienceLocationMapper\`). Adds capacity management and **Level 3** price override.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`exp_location_id\` | BIGINT FK | No | References \`ExperienceLocationMapper.id\` — ties slot to a specific experience AT a specific location |
| \`timeslot_id\` | BIGINT FK | No | References \`TimeSlot.id\` |
| \`price_override\` | DECIMAL(10,2) | Yes | Price for this slot at this location; \`null\` = use \`ExperienceLocationMapper\` price |
| \`max_capacity\` | INT | Yes | Max bookings allowed per slot; overrides \`ExperienceDetail.max_capacity\` if set |
| \`current_bookings\` | INT | No | Live counter of confirmed bookings in this slot (default: 0) |
| \`is_active\` | BOOLEAN | No | Whether this slot is available for booking |
| \`valid_from\` | DATE | Yes | Date from which this slot is valid |
| \`valid_to\` | DATE | Yes | Date after which this slot expires |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

---

### 2.19 \`ExperiencePincodePrice\`
> Most granular pricing level. Overrides price for a specific pincode within a specific timeslot. **Level 4** of pricing.

| Field | Type | Nullable | Meaning |
|---|---|---|---|
| \`id\` | BIGINT | No | Primary key |
| \`exp_timeslot_id\` | BIGINT FK | No | References \`ExperienceTimeSlotMapper.id\` |
| \`pincode_id\` | BIGINT FK | No | The specific pincode for which this price applies |
| \`price_override\` | DECIMAL(10,2) | No | Final resolved price for this pincode at this slot |
| \`is_active\` | BOOLEAN | No | Whether this pincode price is active |
| \`valid_from\` | DATE | Yes | Date from which pincode price is valid |
| \`valid_to\` | DATE | Yes | Date after which pincode price expires |
| \`deleted\` | BOOLEAN | No | Soft delete flag |
| \`created_on\` | DATETIME | No | Auto-set on insert |
| \`updated_on\` | DATETIME | No | Auto-set on update |

## 5. Discovery & Filtering APIs

> These are the read-heavy public-facing APIs that power search, listing pages, and experience detail page.

### 5.1 Experience Search & Listing

\`\`\`
GET /api/experiences/search
\`\`\`

**Query Parameters:**

| Param | Type | Example | Description |
|---|---|---|---|
| \`q\` | string | \`birthday\` | Full-text search across \`name\`, \`short_description\`, \`tag_name\` |
| \`categoryId\` | long | \`1\` | Filter by category |
| \`subCategoryId\` | long | \`3\` | Filter by sub-category |
| \`locationId\` | long | \`5\` | Filter by location |
| \`pincode\` | string | \`110001\` | Filter by pincode (checks \`ExperienceLocationMapper\` + \`Pincode\`) |
| \`minPrice\` | decimal | \`499\` | Minimum resolved price |
| \`maxPrice\` | decimal | \`2999\` | Maximum resolved price |
| \`date\` | date | \`2026-03-15\` | Filter experiences that have available slots on this date |
| \`isFeatured\` | boolean | \`true\` | Show only featured experiences |
| \`rating\` | decimal | \`4\` | Show experiences with average rating ≥ this value |
| \`sortBy\` | enum | \`price_asc\`, \`price_desc\`, \`rating\`, \`popular\`, \`newest\`, \`display_order\` | Sort order |
| \`page\` | int | \`0\` | Page number (0-indexed) |
| \`size\` | int | \`12\` | Page size |

**Example Request:**
\`\`\`
GET /api/experiences/search?locationId=5&pincode=110001&categoryId=1&maxPrice=2000&sortBy=rating&page=0&size=12
\`\`\`

      "basePrice": 1499.00,

### 5.3 Available Slots for a Date

> Returns non-full timeslots for a given experience + location + date.

\`\`\`
GET /api/experiences/{id}/available-slots
\`\`\`

| \`pincode\` | string | No | Pincode for price display |

\`\`\`json

    "label": "Morning Slot",

### 5.6 Pincode Lookup / Serviceability Check

\`\`\`
GET /api/locations/check-pincode?pincode=110001
\`\`\`

**Response:**
\`\`\`json
{
  "pincode": "110001",
  "areaName": "Connaught Place",
  "locationId": 5,
  "locationName": "Central Delhi",
  "isServiceable": true
}
\`\`\`

---

### 5.7 Featured & Homepage Experiences

\`\`\`
GET /api/experiences/featured
\`\`\`

Returns experiences with \`is_featured = true\`, ordered by \`display_order\`. Accepts optional \`locationId\` to show location-specific resolved prices.

---

### 5.8 Trending / Popular Experiences

\`\`\`
GET /api/experiences/trending?locationId=5&limit=10
\`\`\`

Sorted by a composite score: \`(rating × log(review_count + 1))\` — customizable in service layer.

---

### 5.9 Related Experiences

\`\`\`
GET /api/experiences/{id}/related?locationId=5&limit=6
\`\`\`

Returns other experiences in the same sub-category, filtered by location, ordered by \`display_order\`.

| \`GET /api/admin/experiences/{id}/booking-stats\` | Total bookings, revenue, slot fill rate per experience |
| \`GET /api/admin/locations/{id}/revenue-summary\` | Revenue breakdown by experience per location |
